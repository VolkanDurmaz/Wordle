<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Klonu</title>
    <style>
        body {
            background-color: #121213;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
            border-bottom: 1px solid #3a3a3c;
            padding-bottom: 10px;
        }

        #game-board {
            display: grid;
            grid-template-rows: repeat(6, 62px);
            grid-template-columns: repeat(5, 62px);
            gap: 5px;
        }

        .tile {
            width: 62px;
            height: 62px;
            border: 2px solid #3a3a3c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            box-sizing: border-box;
            transition: background-color 0.3s;
        }

        /* JS'teki classList.add ile tetiklenen renkler */
        .correct { background-color: #538d4e; border-color: #538d4e; }
        .present { background-color: #b59f3b; border-color: #b59f3b; }
        .absent { background-color: #3a3a3c; border-color: #3a3a3c; }

        #message {
            margin-top: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            height: 30px;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <h1>WORDLE</h1>

    <div id="game-board"></div>

    <p id="message"></p>

    <script src="wordle.js" type="module" ></script>

</body>
</html>
